name: Build and Publish Docker Images

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'images/*/**'

permissions: {}

env:
  REGISTRY: ghcr.io

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Find changed images
        if: github.event_name == 'push'
        id: changed
        run: |
          # On push, only build images whose files were modified (e.g. by Renovate
          # bumping a base image digest).
          # Extract unique image names from changed paths:
          # e.g. images/go-jsonnet/Dockerfile -> go-jsonnet
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          NAMES=$(echo "$CHANGED" \
            | grep '^images/[^/]*/' \
            | sed 's|images/\([^/]*\)/.*|\1|' \
            | sort -u)
          echo "names=$NAMES" >> "$GITHUB_OUTPUT"

      - name: Find all images
        if: github.event_name != 'push'
        id: all
        run: |
          # On schedule/dispatch there is no commit to diff against, so check
          # every image for new upstream tags. The matrix step filters out
          # images whose tag already exists in GHCR.
          NAMES=$(find images -name build.yaml -printf '%h\n' \
            | xargs -I{} basename {})
          echo "names=$NAMES" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
          EVENT_NAME: ${{ github.event_name }}
          NAMES: ${{ steps.changed.outputs.names || steps.all.outputs.names }}
        run: |
          # For each image, read its build.yaml, resolve the upstream tag,
          # and add it to the build matrix unless it already exists in GHCR.
          MATRIX="[]"
          for NAME in $NAMES; do
            CONFIG="images/$NAME/build.yaml"
            UPSTREAM=$(yq '.upstream' "$CONFIG")
            STRATEGY=$(yq '.strategy' "$CONFIG")
            CONTEXT=$(yq '.context' "$CONFIG")
            DOCKERFILE=$(yq '.dockerfile' "$CONFIG")
            TAG=""

            # Resolve the latest semver tag from the upstream repository
            if [ "$STRATEGY" = "latest-tag" ]; then
              TAG=$(git ls-remote --tags --sort=-v:refname "$UPSTREAM" \
                | head -1 \
                | sed 's|.*refs/tags/||')
            fi

            # On schedule/dispatch, skip if this tag is already in GHCR.
            # Push events always build to pick up base image updates.
            if [ "$EVENT_NAME" != "push" ] && [ -n "$TAG" ]; then
              PACKAGE="$REPO_NAME/$NAME"
              if gh api "/user/packages/container/$PACKAGE/versions" \
                --jq ".[].metadata.container.tags[]" 2>/dev/null \
                | grep -qx "$TAG"; then
                echo "Skipping $NAME: $TAG already in registry"
                continue
              fi
            fi

            # Append this image to the matrix JSON array
            MATRIX=$(echo "$MATRIX" | jq -c \
              --arg name "$NAME" \
              --arg upstream "$UPSTREAM" \
              --arg tag "$TAG" \
              --arg context "$CONTEXT" \
              --arg dockerfile "$DOCKERFILE" \
              '. += [{name:$name,upstream:$upstream,tag:$tag,context:$context,dockerfile:$dockerfile}]')
          done
          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    if: needs.discover.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Clone upstream repository
        if: startsWith(matrix.context, 'upstream/')
        env:
          UPSTREAM_REPO: ${{ matrix.upstream }}
          UPSTREAM_TAG: ${{ matrix.tag }}
        run: |
          git clone --depth 1 --branch "$UPSTREAM_TAG" \
            "$UPSTREAM_REPO" upstream

      - name: Generate tags
        id: tags
        env:
          IMAGE_NAME: ${{ matrix.name }}
          UPSTREAM_TAG: ${{ matrix.tag }}
          REPO: ${{ github.repository }}
        run: |
          # Build comma-separated tag list for the image:
          #   latest                     (always)
          #   $upstreamTag               (moving tag, tracks upstream version)
          #   $upstreamTag-$timestamp    (immutable, unique per build)
          IMAGE="${{ env.REGISTRY }}/$REPO/$IMAGE_NAME"
          TIMESTAMP=$(date +"%Y%m%d%H%M")
          TAGS="$IMAGE:latest"
          if [ -n "$UPSTREAM_TAG" ]; then
            TAGS="$TAGS,$IMAGE:$UPSTREAM_TAG"
            TAGS="$TAGS,$IMAGE:$UPSTREAM_TAG-$TIMESTAMP"
          else
            TAGS="$TAGS,$IMAGE:$TIMESTAMP"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          BUILD_CONTEXT: ${{ matrix.context }}
          BUILD_DOCKERFILE: ${{ matrix.dockerfile }}
          BUILD_UPSTREAM_REF: ${{ matrix.tag }}
          BUILD_TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          # Convert comma-separated tags into --tag arguments
          IFS=',' read -ra TAG_LIST <<< "$BUILD_TAGS"
          TAG_ARGS=()
          for T in "${TAG_LIST[@]}"; do
            TAG_ARGS+=(--tag "$T")
          done

          # Build multi-platform image and push to GHCR
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "UPSTREAM_REF=$BUILD_UPSTREAM_REF" \
            --file "$BUILD_DOCKERFILE" \
            "${TAG_ARGS[@]}" \
            --push \
            "$BUILD_CONTEXT"
