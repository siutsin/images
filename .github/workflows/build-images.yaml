name: Build and Publish Docker Images

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'images/*/**'

permissions: {}

env:
  REGISTRY: ghcr.io

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Find changed images
        if: github.event_name == 'push'
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          # On push, only build images whose files were modified (e.g. by Renovate
          # bumping a base image digest). Use github.event.before to catch all
          # commits in a multi-commit push, not just the last one.
          # e.g. images/go-jsonnet/Dockerfile -> go-jsonnet
          if echo "$BEFORE_SHA" | grep -qx '0\{40\}'; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff --name-only "$BEFORE_SHA" HEAD)
          fi
          NAMES=$(echo "$CHANGED" \
            | grep '^images/[^/]*/' \
            | sed 's|images/\([^/]*\)/.*|\1|' \
            | sort -u \
            | tr '\n' ' ')
          echo "names=$NAMES" >> "$GITHUB_OUTPUT"

      - name: Find all images
        if: github.event_name != 'push'
        id: all
        run: |
          # On schedule/dispatch there is no commit to diff against, so check
          # every image for new upstream tags. The matrix step filters out
          # images whose tag already exists in GHCR.
          NAMES=$(find images -name build.yaml -printf '%h\n' \
            | xargs -I{} basename {} \
            | tr '\n' ' ')
          echo "names=$NAMES" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          EVENT_NAME: ${{ github.event_name }}
          NAMES: ${{ steps.changed.outputs.names || steps.all.outputs.names }}
        run: |
          # For each image, read its build.yaml, resolve the upstream version,
          # and add it to the build matrix unless it already exists in GHCR.
          MATRIX="[]"
          read -ra NAME_LIST <<< "$NAMES"
          for NAME in "${NAME_LIST[@]}"; do
            CONFIG="images/$NAME/build.yaml"
            UPSTREAM=$(yq '.upstream' "$CONFIG")
            STRATEGY=$(yq '.strategy' "$CONFIG")
            CONTEXT=$(yq '.context' "$CONFIG")
            DOCKERFILE=$(yq '.dockerfile' "$CONFIG")
            TAG=""

            if [ "$STRATEGY" = "latest-tag" ]; then
              # Resolve the latest non-prerelease semver tag from upstream.
              TAG=$(git ls-remote --tags --sort=-v:refname "$UPSTREAM" \
                | grep -v '\^{}' \
                | grep -Ev 'refs/tags/[^[:space:]]*-' \
                | head -1 \
                | sed 's|.*refs/tags/||')
            elif [ "$STRATEGY" = "npm-latest" ]; then
              # Resolve the latest published version from the npm registry.
              TAG=$(npm view "$UPSTREAM" version)
            else
              echo "::error file=$CONFIG::Unsupported strategy: $STRATEGY"
              exit 1
            fi

            # On schedule/dispatch, skip if this tag is already in GHCR.
            # Push events always build to pick up base image updates.
            if [ "$EVENT_NAME" != "push" ] && [ -n "$TAG" ]; then
              # URL-encode the package name because it contains a slash
              # e.g. images/go-jsonnet -> images%2Fgo-jsonnet
              PACKAGE=$(printf '%s' "$REPO_NAME/$NAME" | jq -sRr @uri)
              if gh api "/users/$REPO_OWNER/packages/container/$PACKAGE/versions" \
                --jq ".[].metadata.container.tags[]" 2>/dev/null \
                | grep -qx "$TAG"; then
                echo "Skipping $NAME: $TAG already in registry"
                continue
              fi
            fi

            # Append this image to the matrix JSON array
            MATRIX=$(echo "$MATRIX" | jq -c \
              --arg name "$NAME" \
              --arg upstream "$UPSTREAM" \
              --arg tag "$TAG" \
              --arg context "$CONTEXT" \
              --arg dockerfile "$DOCKERFILE" \
              '. += [{name:$name,upstream:$upstream,tag:$tag,context:$context,dockerfile:$dockerfile}]')
          done
          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    if: needs.discover.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Clone upstream repository
        if: startsWith(matrix.context, 'upstream')
        env:
          UPSTREAM_REPO: ${{ matrix.upstream }}
          UPSTREAM_TAG: ${{ matrix.tag }}
        run: |
          git clone --depth 1 --branch "$UPSTREAM_TAG" \
            "$UPSTREAM_REPO" upstream

      - name: Generate tags
        id: tags
        env:
          IMAGE_NAME: ${{ matrix.name }}
          UPSTREAM_TAG: ${{ matrix.tag }}
          REPO: ${{ github.repository }}
        run: |
          # Build comma-separated tag list for the image:
          #   latest                     (always)
          #   $upstreamTag               (moving tag, tracks upstream version)
          #   $upstreamTag-$timestamp    (immutable, unique per build)
          IMAGE="$REGISTRY/$REPO/$IMAGE_NAME"
          TIMESTAMP=$(date +"%Y%m%d%H%M")
          TAGS="$IMAGE:latest"
          if [ -n "$UPSTREAM_TAG" ]; then
            TAGS="$TAGS,$IMAGE:$UPSTREAM_TAG"
            TAGS="$TAGS,$IMAGE:$UPSTREAM_TAG-$TIMESTAMP"
          else
            TAGS="$TAGS,$IMAGE:$TIMESTAMP"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          BUILD_CONTEXT: ${{ matrix.context }}
          BUILD_DOCKERFILE: ${{ matrix.dockerfile }}
          BUILD_UPSTREAM_REF: ${{ matrix.tag }}
          BUILD_TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          # Convert comma-separated tags into --tag arguments
          IFS=',' read -ra TAG_LIST <<< "$BUILD_TAGS"
          TAG_ARGS=()
          for T in "${TAG_LIST[@]}"; do
            TAG_ARGS+=(--tag "$T")
          done

          # Build multi-platform image and push to GHCR
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "UPSTREAM_REF=$BUILD_UPSTREAM_REF" \
            --file "$BUILD_DOCKERFILE" \
            "${TAG_ARGS[@]}" \
            --push \
            "$BUILD_CONTEXT"
