name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions: {}

env:
  CLAUDE_REVIEW_MODEL: claude-sonnet-4-6

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check-files:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      should-review: ${{ steps.check.outputs.should-review }}
    steps:
      - name: Check if review is needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.url }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [ "$ACTOR" = "renovate[bot]" ]; then
            echo "should-review=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILES=$(gh api "$PR_URL/files" --paginate --jq '.[].filename')
          if echo "$FILES" | grep -Fqvx '.github/workflows/claude.yaml'; then
            echo "should-review=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-review=false" >> "$GITHUB_OUTPUT"
          fi

  claude:
    needs: check-files
    if: |
      always() &&
      ((github.event_name == 'pull_request' && needs.check-files.outputs.should-review == 'true') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') ||
        contains(github.event.issue.title, '@claude'))))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: automation
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: >-
            --model ${{ env.CLAUDE_REVIEW_MODEL }}
            --max-turns 5
            --allowedTools "Bash(gh pr edit:*),Bash(gh pr view:*),Bash(gh pr diff:*)"
          prompt: |
            If the PR title or description does not meaningfully describe the changes, update them.
            Use conventional commit style for the title, under 72 characters.
            Keep the description short with bullet points summarising the changes.

            Review the PR changes with focus on:
            1. Code quality, readability, and best practices
            2. Security vulnerabilities
            3. Potential bugs or edge cases
            4. Dockerfile and workflow correctness

            Skip auto-generated files and lock files.
            Keep output short and concise. Use bullet points where possible.
            Only comment on issues worth fixing. Skip praise and nitpicks.

  claude-status:
    if: always()
    needs: claude
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check claude result
        env:
          CLAUDE_RESULT: ${{ needs.claude.result }}
        run: |
          case "$CLAUDE_RESULT" in
            success|skipped)
              exit 0
              ;;
            failure|cancelled)
              exit 1
              ;;
            *)
              echo "Unexpected Claude job result: $CLAUDE_RESULT"
              exit 1
              ;;
          esac
